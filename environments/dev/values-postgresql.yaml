fullnameOverride: "postgresql"

auth:
  # 一般ユーザー。通常のDB操作に使用
  username: "contact_api_dev"
  database: "contact_api_dev"
  existingSecret: "postgresql-credentials"
  secretKeys:
    adminPasswordKey: "postgres-password"
    userPasswordKey: "contact-api-dev-password"

primary:
  # initdb スクリプトに OPENFGA_DB_PASSWORD 環境変数を渡すための Secret
  extraEnvVarsSecret: "openfga-db-credentials"
  initdb:
    scripts:
      create-openfga-db.sh: |
        #!/bin/bash
        set -e
        PGPASSWORD="$(cat /opt/bitnami/postgresql/secrets/postgres-password)" \
          psql -v ON_ERROR_STOP=1 --username postgres <<-EOSQL
            CREATE USER openfga WITH PASSWORD '${OPENFGA_DB_PASSWORD}';
            CREATE DATABASE openfga OWNER openfga;
        EOSQL
  persistence:
    size: "1Gi"
