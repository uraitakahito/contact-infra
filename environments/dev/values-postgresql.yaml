fullnameOverride: "postgresql"

auth:
  existingSecret: "postgresql-credentials"
  secretKeys:
    adminPasswordKey: "postgres-password"

primary:
  extraEnvVarsSecret: "postgresql-initdb-credentials"
  initdb:
    scripts:
      create-users.sh: |
        #!/bin/bash
        set -e
        # bitnami/postgresql の組み込みユーザー作成 (auth.username) は 1 ユーザーしか対応していないため、
        # すべての一般ユーザーを initdb スクリプトで統一的に作成する
        PGPASSWORD="$(cat /opt/bitnami/postgresql/secrets/postgres-password)" \
          psql -v ON_ERROR_STOP=1 --username postgres <<-EOSQL
            CREATE USER contact_api_dev WITH PASSWORD '${CONTACT_API_DB_PASSWORD}';
            CREATE DATABASE contact_api_dev OWNER contact_api_dev;
            CREATE USER openfga WITH PASSWORD '${OPENFGA_DB_PASSWORD}';
            CREATE DATABASE openfga OWNER openfga;
        EOSQL
  persistence:
    size: "1Gi"
