fullnameOverride: "postgresql"

auth:
  # 一般ユーザー。通常のDB操作に使用
  username: "contact_api_prod"
  database: "contact_api_prod"
  existingSecret: "postgresql-credentials"
  secretKeys:
    adminPasswordKey: "postgres-password"
    userPasswordKey: "password"

primary:
  initdb:
    scriptsSecret: "postgresql-init-scripts"
  persistence:
    size: "50Gi"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
