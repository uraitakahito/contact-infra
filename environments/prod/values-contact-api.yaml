replicaCount: 3

image:
  repository: ghcr.io/uraitakahito/contact-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

postgresql:
  host: postgresql
  port: 5432
  database: contact_api
  username: contact_api
  existingSecret: contact-api-db-credentials

openfga:
  apiUrl: http://openfga:8080

seed:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
