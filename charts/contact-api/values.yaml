replicaCount: 1

image:
  repository: "contact-api"
  tag: "latest"
  pullPolicy: "Never"

service:
  type: "ClusterIP"
  port: 80

postgresql:
  host: "postgresql"
  port: 5432
  database: "contact_api_dev"
  username: "contact_api_dev"
  password: ""
  existingSecret: ""

openfga:
  apiUrl: "http://openfga:8080"
  configFile: "/shared/openfga-config.json"

openfgaSetup:
  enabled: true

migration:
  enabled: true

seed:
  enabled: false

resources: {}

nodeSelector: {}

tolerations: []
