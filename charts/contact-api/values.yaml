replicaCount: 1

image:
  repository: "contact-api"
  tag: "latest"
  pullPolicy: "Never"

service:
  type: "ClusterIP"
  port: 80

postgresql:
  host: "postgresql"
  port: 5432
  # database, username は environments/<env>/values-contact-api.yaml で環境ごとに上書きされる
  database: "contact_api"
  username: "contact_api"
  password: ""
  existingSecret: ""

openfga:
  apiUrl: "http://openfga:8080"
  configFile: "/shared/openfga-config.json"

openfgaSetup:
  enabled: true

migration:
  enabled: true

seed:
  enabled: false

resources: {}

nodeSelector: {}

tolerations: []
