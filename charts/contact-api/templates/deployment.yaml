apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contact-api.fullname" . }}
  labels:
    {{- include "contact-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "contact-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "contact-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.openfgaSetup.enabled }}
      initContainers:
        - name: setup-openfga
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "dist/src/bin/setup-openfga.js"
            - "--openfga-url"
            - "{{ .Values.openfga.apiUrl }}"
            - "--output-file"
            - "{{ .Values.openfga.configFile }}"
          volumeMounts:
            - name: shared
              mountPath: /shared
      {{- end }}
      containers:
        - name: contact-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "contact-api.fullname" . }}
            - secretRef:
                name: {{ include "contact-api.secretName" . }}
          volumeMounts:
            - name: shared
              mountPath: /shared
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: shared
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
