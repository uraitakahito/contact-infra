{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contact-api.fullname" . }}
  labels:
    {{- include "contact-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  CONTACT_API_DB_PASSWORD: {{ .Values.postgresql.password | quote }}
{{- end }}
