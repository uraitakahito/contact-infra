suite: Secret
templates:
  - templates/secret.yaml
release:
  name: contact-api
  namespace: contact
tests:
  - it: should render a Secret when existingSecret is not set
    asserts:
      - isKind:
          of: Secret
      - isAPIVersion:
          of: v1
      - hasDocuments:
          count: 1

  - it: should not render when existingSecret is set
    set:
      postgresql:
        existingSecret: "my-external-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should set metadata name using fullname helper
    asserts:
      - equal:
          path: metadata.name
          value: contact-api

  - it: should have type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should have CONTACT_API_DB_PASSWORD in stringData
    asserts:
      - isNotNull:
          path: stringData.CONTACT_API_DB_PASSWORD

  - it: should propagate password value from values
    set:
      postgresql:
        password: "s3cret"
    asserts:
      - equal:
          path: stringData.CONTACT_API_DB_PASSWORD
          value: "s3cret"

  - it: should have standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
