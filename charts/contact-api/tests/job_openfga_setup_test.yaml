suite: Job - openfga-setup
templates:
  - templates/job-openfga-setup.yaml
release:
  name: contact-api
  namespace: contact
tests:
  - it: should render when openfgaSetup.enabled is true
    asserts:
      - isKind:
          of: Job
      - isAPIVersion:
          of: batch/v1
      - hasDocuments:
          count: 1

  - it: should not render when openfgaSetup.enabled is false
    set:
      openfgaSetup:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have -openfga-setup suffix in name
    asserts:
      - equal:
          path: metadata.name
          value: contact-api-openfga-setup

  - it: should have hook-weight 1
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "1"

  - it: should have post-install and post-upgrade hook
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade"

  - it: should have backoffLimit 3
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 3

  - it: should run setup-openfga.js with correct args
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "dist/src/bin/setup-openfga.js"
            - "--openfga-url"
            - "http://openfga:8080"
            - "--output-file"
            - "/tmp/openfga-config.json"

  - it: should reflect custom openfga.apiUrl in args
    set:
      openfga:
        apiUrl: "http://custom:9090"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "dist/src/bin/setup-openfga.js"
            - "--openfga-url"
            - "http://custom:9090"
            - "--output-file"
            - "/tmp/openfga-config.json"

  - it: should have component label openfga-setup
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: openfga-setup
