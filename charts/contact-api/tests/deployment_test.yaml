suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: contact-api
  namespace: contact
tests:
  # --- Basic structure ---

  - it: should render a Deployment with default values
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1
      - hasDocuments:
          count: 1

  - it: should set metadata name using fullname helper
    asserts:
      - equal:
          path: metadata.name
          value: contact-api

  - it: should default to 1 replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should reflect custom replicaCount
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should have selector matchLabels matching selectorLabels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: contact-api
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: contact-api

  # --- Main container ---

  - it: should have container named contact-api
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: contact-api

  - it: should use image from values
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "contact-api:latest"

  - it: should reflect custom image tag
    set:
      image:
        tag: "v2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "contact-api:v2.0.0"

  - it: should use imagePullPolicy from values
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Never

  - it: should expose port 80 named http
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 80
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http

  - it: should have envFrom with configMapRef
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: contact-api

  - it: should have envFrom with secretRef using fullname
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: contact-api

  - it: should use existingSecret for secretRef when set
    set:
      postgresql:
        existingSecret: "ext-secret"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: ext-secret

  # --- Probes ---

  - it: should have livenessProbe on /health/live
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health/live
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 10

  - it: should have readinessProbe on /health/ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health/ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 5

  # --- Volumes ---

  - it: should have shared emptyDir volume
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: shared
      - equal:
          path: spec.template.spec.volumes[0].emptyDir
          value: {}

  - it: should mount shared as readOnly in main container
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: shared
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /shared
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].readOnly
          value: true

  # --- initContainer ---

  - it: should have initContainer when openfgaSetup.enabled is true
    asserts:
      - isNotEmpty:
          path: spec.template.spec.initContainers

  - it: should not have initContainers when openfgaSetup.enabled is false
    set:
      openfgaSetup:
        enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.initContainers

  - it: should name initContainer setup-openfga
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: setup-openfga

  - it: should use same image for initContainer as main container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "contact-api:latest"

  - it: should pass openfga args to initContainer
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].args
          value:
            - "dist/src/bin/setup-openfga.js"
            - "--openfga-url"
            - "http://openfga:8080"
            - "--output-file"
            - "/shared/openfga-config.json"

  - it: should mount shared without readOnly in initContainer
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].volumeMounts[0].name
          value: shared
      - equal:
          path: spec.template.spec.initContainers[0].volumeMounts[0].mountPath
          value: /shared
      - isNull:
          path: spec.template.spec.initContainers[0].volumeMounts[0].readOnly

  # --- Optional fields ---

  - it: should not set resources by default
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources

  - it: should render resources when set
    set:
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "512Mi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "250m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "512Mi"

  - it: should not set nodeSelector by default
    asserts:
      - isNull:
          path: spec.template.spec.nodeSelector

  - it: should render nodeSelector when set
    set:
      nodeSelector:
        disktype: "ssd"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should not set tolerations by default
    asserts:
      - isNull:
          path: spec.template.spec.tolerations

  - it: should render tolerations when set
    set:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "api"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
      - equal:
          path: spec.template.spec.tolerations[0].effect
          value: NoSchedule
